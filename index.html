<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box" id="box1" data-value="10">10</div>
        <div class="box" id="box2" data-value="32">32</div>
        <div class="box" id="box3" data-value="64">64</div>
        <div class="box" id="box4" data-value="-15">-15</div>
    </div>
    <div class="sum-container">
        Sum: <span id="sumDisplay">0</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
